<!DOCTYPE html>
<html>
<head>
    <title>AI报警测试</title>
</head>
<body>

<h2>AI报警测试</h2>

<script>

const ws = new WebSocket("ws://localhost:8000/ws/alarm");

ws.onopen = () => {
    console.log("WebSocket连接成功");
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    console.log("报警:", data);

    const div = document.createElement("div");
    div.innerText = "报警: " + JSON.stringify(data);

    document.body.appendChild(div);
};

ws.onerror = (err) => {
    console.log("WebSocket错误", err);
};

ws.onclose = () => {
    console.log("WebSocket关闭");
};

</script>

</body>
</html>
