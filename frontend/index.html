    <script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script>
      var alarmVolume = 0.3;
      var alarmAudioCtx = null;
      var alarmOscillator = null;
      var alarmBeepInterval = null;
      
      function stopAlarmSound() {
        if (alarmBeepInterval) clearInterval(alarmBeepInterval);
        if (alarmOscillator) { try { alarmOscillator.stop(); } catch(e) {} }
        if (alarmAudioCtx) { try { alarmAudioCtx.close(); } catch(e) {} }
        alarmBeepInterval = null;
        alarmOscillator = null;
        alarmAudioCtx = null;
      }
      
      function playAlarmSound(level, loop) {
        stopAlarmSound();
        if (level === 'low') return;
        try {
          alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
          
          function beep() {
            if (!alarmAudioCtx) return;
            var osc = alarmAudioCtx.createOscillator();
            var gain = alarmAudioCtx.createGain();
            osc.connect(gain);
            gain.connect(alarmAudioCtx.destination);
            gain.gain.value = alarmVolume;
            
            if (level === 'medium') {
              osc.frequency.value = 600;
              osc.type = 'square';
              osc.start();
              setTimeout(function() { osc.stop(); }, 150);
            }
            
            if (level === 'high' || level === 'severe') {
              osc.frequency.value = 1000;
              osc.type = 'square';
              osc.start();
              setTimeout(function() { osc.frequency.value = 800; }, 120);
              setTimeout(function() { osc.frequency.value = 1000; }, 240);
              setTimeout(function() { osc.stop(); }, 400);
            }
          }
          
          beep();
          if (loop) {
            alarmBeepInterval = setInterval(beep, level === 'high' ? 600 : 1000);
            setTimeout(stopAlarmSound, 20000);
          }
        } catch(e) {}
      }

      function showFenceAlarm(deviceName, violationType, fenceName, level) {
        playAlarmSound(level || 'medium', true);
        
        var borderGlow = document.createElement('div');
        borderGlow.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9998;box-shadow:inset 0 0 100px 40px rgba(239,68,68,0.7),0 0 150px 50px rgba(239,68,68,0.5);animation:pulse 0.4s ease-in-out infinite alternate;';
        document.body.appendChild(borderGlow);

        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.4);cursor:pointer;';
        document.body.appendChild(overlay);

        var toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.5);opacity:0;z-index:10000;background:linear-gradient(135deg,#ef4444 0%,#dc2626 50%,#b91c1c 100%);color:white;padding:40px 80px;border-radius:24px;box-shadow:0 0 100px rgba(239,68,68,0.9),0 50px 100px -20px rgba(0,0,0,0.6);font-size:28px;font-weight:800;border:4px solid #fca5a5;';
        toast.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;gap:20px;min-width:400px;text-align:center;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:ring 0.12s ease-in-out infinite alternate;transform-origin:center;">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <div style="font-size:32px;line-height:1.4;">🚨 围栏越界报警</div>
            <div style="font-size:22px;opacity:0.95;">${deviceName} ${violationType} ${fenceName}</div>
            <div style="font-size:16px;opacity:0.7;margin-top:10px;">点击任意位置关闭</div>
          </div>
        `;
        document.body.appendChild(toast);

        setTimeout(function() {
          toast.style.transition = 'all 0.3s ease-out';
          toast.style.transform = 'translate(-50%,-50%) scale(1)';
          toast.style.opacity = '1';
        }, 10);

        function closeAlarm() {
          stopAlarmSound();
          borderGlow.remove();
          overlay.remove();
          toast.remove();
          document.removeEventListener('click', closeAlarm);
        }
        overlay.onclick = closeAlarm;
        toast.onclick = closeAlarm;
        setTimeout(function() {
          document.addEventListener('click', closeAlarm);
        }, 100);
      }
    </script>
    <style>
      @keyframes pulse {
        from { opacity: 0.7; }
        to { opacity: 1; }
      }
      @keyframes ring {
        from { transform: rotate(-10deg); }
        to { transform: rotate(10deg); }
      }

      /* Custom Scrollbar for Light Theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; /* slate-100 */
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; /* slate-400 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* slate-500 */
      }
      
      /* HUD Corner accents for Light Theme */
      .hud-border {
        position: relative;
        border: 1px solid rgba(51, 65, 85, 0.2); /* slate-700/20 */
        background: rgba(241, 245, 249, 0.6); /* slate-100/60 */
      }
      .hud-border::before {
        content: '';
        position: absolute;
        top: -1px; left: -1px;
        width: 10px; height: 10px;
        border-top: 2px solid #64748b; /* slate-500 */
        border-left: 2px solid #64748b; /* slate-500 */
        z-index: 10;
      }
      .hud-border::after {
        content: '';
        position: absolute;
        bottom: -1px; right: -1px;
        width: 10px; height: 10px;
        border-bottom: 2px solid #64748b; /* slate-500 */
        border-right: 2px solid #64748b; /* slate-500 */
        z-index: 10;
      }

      /* Map container fix */
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 1;
      }
    </style>
